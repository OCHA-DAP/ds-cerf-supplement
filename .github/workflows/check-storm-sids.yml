name: Check storm SIDs

# Daily: backfill SIDs for storm allocations that resolve unambiguously from
# their title, and open an issue (tagging the maintainer) for any that don't.
# Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-storm-sids:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install
        # --no-sources ignores the local-path ocha-stratus override in
        # pyproject (used for local dev) and pulls it from PyPI instead.
        run: |
          uv venv --python 3.12
          uv pip install --no-sources -e .

      - name: Check storm SIDs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PGSSLMODE: require
          # Database — read + write (supplement lives in aa.cerf_* tables)
          DSCI_AZ_DB_DEV_HOST: ${{ secrets.DSCI_AZ_DB_DEV_HOST }}
          DSCI_AZ_DB_DEV_UID: ${{ secrets.DSCI_AZ_DB_DEV_UID }}
          DSCI_AZ_DB_DEV_PW: ${{ secrets.DSCI_AZ_DB_DEV_PW }}
          DSCI_AZ_DB_DEV_UID_WRITE: ${{ secrets.DSCI_AZ_DB_DEV_UID_WRITE }}
          DSCI_AZ_DB_DEV_PW_WRITE: ${{ secrets.DSCI_AZ_DB_DEV_PW_WRITE }}
        run: uv run --no-sync python scripts/check_storm_sids.py --write
