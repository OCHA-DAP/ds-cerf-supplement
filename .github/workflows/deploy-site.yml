name: Deploy site

# Builds site/data.json from the blob + DB and deploys the static page to
# GitHub Pages. Runs daily (after the storm-SID check), on demand, and on push
# to the site/script files.
on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/export_site_data.py"
      - ".github/workflows/deploy-site.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install
        run: |
          uv venv --python 3.12
          uv pip install --no-sources -e .

      - name: Generate data.json
        env:
          PGSSLMODE: require
          DSCI_AZ_DB_DEV_HOST: ${{ secrets.DSCI_AZ_DB_DEV_HOST }}
          DSCI_AZ_DB_DEV_UID: ${{ secrets.DSCI_AZ_DB_DEV_UID }}
          DSCI_AZ_DB_DEV_PW: ${{ secrets.DSCI_AZ_DB_DEV_PW }}
        run: uv run --no-sync python scripts/export_site_data.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
